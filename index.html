<!DOCTYPE html>
<html>
<head>
  <title>GmatiQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: left;
      padding: 40px;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 64px;
      margin: 0 0 20px;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
      color: #444;
    }

    .buttons a {
      display: inline-block;
      margin-right: 10px;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
    }

    .primary {
      background: #111;
      color: #fff;
    }

    .secondary {
      border: 1px solid #111;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Operate with precision.</h1>
    <p>Track. Structure. Control your operations.</p>

    <div class="buttons">
      <a href="#" class="primary">View system</a>
      <a href="mailto:hello@gmatiq.com" class="secondary">Request access</a>
    </div>
  </div>
</body>
</html>
